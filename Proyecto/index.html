<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="estilos.css">
        <title>Juegos</title>
    </head>
    <body>
        <header>
            <h1>Catálogo de juegos</h1>
        </header>
        <section class="hero">
            <div class="slider">
                <div class="imagenes">
                    <img src="slider/Terraria.jpg" alt="Terraria">
                    <img src="slider/dk-bananza.jpg" alt="Donkey Kong Bananza">
                    <img src="slider/astrobot.jpg" alt="Astrobot">
                    <img src="slider/Marvel Rivals.jpg" alt="Marvel Rivals">
                    <img src="slider/Terraria.jpg" alt="" aria-hidden="true">
                </div>
                           
           </div>
        </section>
        <div>
            <div class="controles">
                <input type="text" id="buscador" placeholder="Buscar videojuego...">
                <select id="filtroGenero">
                    <option value="todos">Todos</option>
                    <option value="Acción">Acción</option>
                    <option value="Terror">Terror</option>
                    <option value="RPG">RPG</option>
                    <option value="Plataformas">Plataformas</option>
                    <option value="Sandbox">Sandbox</option>
                </select>
            </div>  
            
            <div id="letras"></div>
            
            <div id="catalogo"></div>

            <div id="info">
                <h2>Selecciona un juego</h2>
                <p>Pulsa una tarjeta para ver información.</p>
            </div>

            <script src="script.js"></script>
        </div>
        <footer>
            Proyecto de Desarrollo de Interfaces
        </footer>
    </body>
</html>
